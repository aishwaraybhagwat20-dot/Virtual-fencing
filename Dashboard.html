<!DOCTYPE html>
<html>
<head>
  <title>Dual Zone Security Dashboard</title>
  <meta http-equiv="refresh" content="3">

  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    h1 {
      margin-bottom: 5px;
    }

    .subtitle {
      color: #94a3b8;
      margin-bottom: 20px;
    }

    .container {
      display: flex;
      gap: 20px;
    }

    .left-panel {
      flex: 2;
      background: #1e293b;
      border-radius: 20px;
      padding: 20px;
    }

    .right-panel {
      flex: 1;
      background: #1e293b;
      border-radius: 20px;
      padding: 20px;
      overflow-y: auto;
      max-height: 90vh;
    }

    .camera-feed {
      width: 100%;
      border-radius: 15px;
      border: 2px solid #334155;
    }

    .section {
      margin-top: 25px;
    }

    .status-box {
      background: #334155;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .status-box input {
      width: 100%;
      margin-top: 6px;
      padding: 8px;
      border-radius: 6px;
      border: none;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      cursor: pointer;
      margin-top: 15px;
    }

    .log-box {
      background: #334155;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 10px;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <h1>Dual Zone Security Dashboard</h1>
  <div class="subtitle">Red zone = Alarm | Orange zone = Warning</div>

  <div class="container">
    <div class="left-panel">
      <h2>Live Camera Feed</h2>
      <img src="http://localhost:5000/latest_frame.jpg" class="camera-feed">
    </div>

    <div class="right-panel">
      <h2>Red Zone Settings</h2>

      <div class="status-box">
        Left
        <input type="number" id="red_left" value="180">
      </div>

      <div class="status-box">
        Top
        <input type="number" id="red_top" value="120">
      </div>

      <div class="status-box">
        Right
        <input type="number" id="red_right" value="450">
      </div>

      <div class="status-box">
        Bottom
        <input type="number" id="red_bottom" value="350">
      </div>

      <h2 class="section">Orange Zone Settings</h2>

      <div class="status-box">
        Left
        <input type="number" id="orange_left" value="80">
      </div>

      <div class="status-box">
        Top
        <input type="number" id="orange_top" value="60">
      </div>

      <div class="status-box">
        Right
        <input type="number" id="orange_right" value="550">
      </div>

      <div class="status-box">
        Bottom
        <input type="number" id="orange_bottom" value="420">
      </div>

      <button onclick="saveZones()">Update Zones</button>

      <h2 class="section">Security Logs</h2>
      <div id="logs"></div>
    </div>
  </div>

  <script>
    async function saveZones() {
      const data = {
        red_zone: {
          left: parseInt(document.getElementById('red_left').value),
          top: parseInt(document.getElementById('red_top').value),
          right: parseInt(document.getElementById('red_right').value),
          bottom: parseInt(document.getElementById('red_bottom').value)
        },
        orange_zone: {
          left: parseInt(document.getElementById('orange_left').value),
          top: parseInt(document.getElementById('orange_top').value),
          right: parseInt(document.getElementById('orange_right').value),
          bottom: parseInt(document.getElementById('orange_bottom').value)
        }
      };

      await fetch('http://localhost:5000/save_zones', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(data)
      });

      alert('Zones updated successfully');
    }

    async function loadLogs() {
      const response = await fetch('http://localhost:5000/get_logs');
      const logs = await response.json();

      const logsDiv = document.getElementById('logs');
      logsDiv.innerHTML = '';

      logs.slice(0, 10).forEach(log => {
        const div = document.createElement('div');
        div.className = 'log-box';
        div.innerText = log;
        logsDiv.appendChild(div);
      });
    }

    loadLogs();
    setInterval(loadLogs, 3000);
  </script>

</body>
</html>
